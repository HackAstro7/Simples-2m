<body>

                    <div class="col">

                        </button>
                    </div>
                </div>
                
                <!-- Redes sociais -->
                <div class="social-icons">
                    <a href="https://www.instagram.com/aindarells?igsh=eG43MTAxb3Q4cDhh" target="_blank" class="instagram">
                        <i class="fab fa-instagram"></i>
                    </a>
                    <a href="https://t.me/Apprellson" target="_blank" class="telegram">
                        <i class="fab fa-telegram-plane"></i>
                    </a>
                    <a href="https://wa.me/5562998136026" target="_blank" class="whatsapp">
                        <i class="fab fa-whatsapp"></i>
                    </a>
                </div>
            </div>
            
            <!-- Banner promocional -->
            <h2 class="section-title">💳 COMPRA ACESSO!</h2>
            
            <div class="promo-banner">
                <img src="https://i.ibb.co/8K8JzJb/fotor-20241015202813.png" alt="Promoção">
                <h2>🔥 Somente 300 Vagas!</h2>
                <p>De <span class="preco-antigo">R$ 157,99</span> por <span class="preco-novo">R$ 56,99</span></p>
                <p><strong>⚡ Garanta já a sua vaga!</strong></p>
                <p>⚠️ Restam apenas <span id="vagas-restantes">127</span> vagas!</p>
                <a href="https://mpago.la/2f13qgu" class="promo-btn">🚀 Aproveitar Agora</a>
